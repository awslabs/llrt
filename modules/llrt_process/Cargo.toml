[package]
name = "llrt_process"
description = "LLRT Module process"
version = "0.8.1-beta"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/awslabs/llrt"

[lib]
name = "llrt_process"
path = "src/lib.rs"

[dependencies]
llrt_utils = { version = "0.8.1-beta", path = "../../libs/llrt_utils", default-features = false }
llrt_stream = { version = "0.8.1-beta", path = "../llrt_stream" }
llrt_context = { version = "0.8.1-beta", path = "../../libs/llrt_context" }
llrt_events = { version = "0.8.1-beta", path = "../llrt_events" }
llrt_tty = { version = "0.8.1-beta", path = "../llrt_tty" }
rquickjs = { version = "0.11", features = ["std"], default-features = false }
tokio = { version = "1", features = ["io-std", "fs"], default-features = false }

[target.'cfg(unix)'.dependencies]
libc = { version = "0.2", default-features = false }

[dev-dependencies]
llrt_test = { path = "../../libs/llrt_test" }
tokio = { version = "1", features = ["test-util"], default-features = false }
